name: Quality Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean compile --no-transfer-progress

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Generate test report
        run: mvn surefire-report:report --no-transfer-progress
        if: always()

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: target/site/surefire-report.html

      - name: Check code style with Checkstyle
        run: mvn checkstyle:check --no-transfer-progress

      - name: Analyze with PMD (static analysis)
        run: mvn pmd:check --no-transfer-progress

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            target/checkstyle-result.xml
            target/pmd.xml
